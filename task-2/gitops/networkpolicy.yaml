apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ledger-api-network-policy
  namespace: payments
spec:
  podSelector:
    matchLabels:
      app: ledger-api

  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow the reporting workload.
    - from:
        - podSelector:
            matchLabels:
              app: reporting
      ports:
        - protocol: TCP
          port: 8080

    # Allow the NGINX Ingress Controller.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/component: controller
      ports:
        - protocol: TCP
          port: 8080

  # Kept open temporarily because /fetch can make outbound requests.
  egress:
    - {}
